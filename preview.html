<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Visualizador de Fotos</title>
  <style>
    body {
      background: #121212;
      color: white;
      font-family: sans-serif;
      padding: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }
    .card {
      background: #1e1e1e;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #333;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    img {
      width: 100%;
      height: 200px;
      object-cover: cover;
    }
    .label {
      padding: 10px;
      font-size: 12px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Painel de Fotos do Casal</h1>
  <div class="grid">
    <!-- Fotos de Início -->
    <div class="card"><img src="public/images/namorados/foto_album_inicio_1.jpg"><div class="label">inicio_1</div></div>
    <div class="card"><img src="public/images/namorados/foto_album_inicio_2.jpg"><div class="label">inicio_2</div></div>
    <div class="card"><img src="public/images/namorados/foto_album_inicio_3.jpg"><div class="label">inicio_3</div></div>
    <div class="card"><img src="public/images/namorados/foto_album_inicio_4.jpg"><div class="label">inicio_4</div></div>
    <div class="card"><img src="public/images/namorados/foto_album_inicio_5.jpg"><div class="label">inicio_5</div></div>
    <div class="card"><img src="public/images/namorados/foto_album_inicio_6.jpg"><div class="label">inicio_6</div></div>
    <div class="card"><img src="public/images/namorados/foto_album_inicio_7.jpg"><div class="label">inicio_7</div></div>
    <div class="card"><img src="public/images/namorados/foto_album_inicio_8.jpg"><div class="label">inicio_8</div></div>
    <div class="card"><img src="public/images/namorados/foto_album_inicio_9.jpg"><div class="label">inicio_9</div></div>
    <div class="card"><img src="public/images/namorados/foto_album_inicio_10.jpg"><div class="label">inicio_10</div></div>
    <div class="card"><img src="public/images/namorados/foto_album_inicio_11.jpg"><div class="label">inicio_11</div></div>
    <div class="card"><img src="public/images/namorados/foto_album_inicio_12.jpg"><div class="label">inicio_12</div></div>
    
    <!-- Fotos de Fim -->
    <div class="card"><img src="public/images/namorados/foto_album_fim_1.jpg"><div class="label">fim_1</div></div>
    <div class="card"><img src="public/images/namorados/foto_album_fim_2.jpg"><div class="label">fim_2</div></div>
    <div class="card"><img src="public/images/namorados/foto_album_fim_3.jpg"><div class="label">fim_3</div></div>
    <div class="card"><img src="public/images/namorados/foto_album_fim_4.jpg"><div class="label">fim_4</div></div>
    <div class="card"><img src="public/images/namorados/foto_album_fim_5.jpg"><div class="label">fim_5</div></div>
    <div class="card"><img src="public/images/namorados/foto_album_fim_6.jpg"><div class="label">fim_6</div></div>
    <div class="card"><img src="public/images/namorados/foto_album_fim_7.jpg"><div class="label">fim_7</div></div>
    <div class="card"><img src="public/images/namorados/foto_album_fim_8.jpg"><div class="label">fim_8</div></div>
    <div class="card"><img src="public/images/namorados/foto_album_fim_9.jpg"><div class="label">fim_9</div></div>
    <div class="card"><img src="public/images/namorados/foto_album_fim_10.jpg"><div class="label">fim_10</div></div>
    <div class="card"><img src="public/images/namorados/foto_album_fim_11.jpg"><div class="label">fim_11</div></div>

</body>
</html>
